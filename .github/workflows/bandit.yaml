name: Bandit

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  bandit:
    permissions:
      contents: read
    uses: senzing-factory/build-resources/.github/workflows/bandit.yaml@v4
    with:
      targets: bin
